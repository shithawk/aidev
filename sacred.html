<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sacred Cosmic Geometry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050510;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none; /* Prevent scroll on mobile */
        }
        
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Custom scrollbar for control panel */
        .controls-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .controls-scroll::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }
        .controls-scroll::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }

        /* Styling Range Sliders */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #fcd34d;
            cursor: pointer;
            margin-top: -6px;
            box-shadow: 0 0 10px rgba(252, 211, 77, 0.5);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
        }
        
        .preset-btn {
            transition: all 0.2s ease;
        }
        .preset-btn:hover {
            background: rgba(252, 211, 77, 0.2);
            border-color: #fcd34d;
        }

        /* Loading Overlay */
        #loader {
            transition: opacity 0.5s ease;
        }
    </style>
</head>
<body class="text-gray-100">

    <nav style="background-color: #333; display: flex; justify-content: flex-end; flex-wrap: wrap; padding: 0 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
        <a href="index.html" 
           style="display: block; color: #f2f2f2; text-align: center; padding: 10px 10px; text-decoration: none; font-size: 15px; transition: background-color 0.3s, color 0.3s;"
           onmouseover="this.style.backgroundColor='#ddd'; this.style.color='black'; this.style.borderRadius='4px';"
           onmouseout="this.style.backgroundColor='transparent'; this.style.color='#f2f2f2';">Home</a> 
        
        <a href="dj.html" 
           style="display: block; color: #f2f2f2; text-align: center; padding: 10px 10px; text-decoration: none; font-size: 15px; transition: background-color 0.3s, color 0.3s;"
           onmouseover="this.style.backgroundColor='#ddd'; this.style.color='black'; this.style.borderRadius='4px';"
           onmouseout="this.style.backgroundColor='transparent'; this.style.color='#f2f2f2';">DJ</a>
        
        <a href="sacred.html" 
           style="display: block; color: #f2f2f2; text-align: center; padding: 10px 10px; text-decoration: none; font-size: 15px; transition: background-color 0.3s, color 0.3s;"
           onmouseover="this.style.backgroundColor='#ddd'; this.style.color='black'; this.style.borderRadius='4px';"
           onmouseout="this.style.backgroundColor='transparent'; this.style.color='#f2f2f2';">Sacred Geometry</a>
        
        <a href="sounds.html" 
           style="display: block; color: #f2f2f2; text-align: center; padding: 10px 10px; text-decoration: none; font-size: 15px; transition: background-color 0.3s, color 0.3s;"
           onmouseover="this.style.backgroundColor='#ddd'; this.style.color='black'; this.style.borderRadius='4px';"
           onmouseout="this.style.backgroundColor='transparent'; this.style.color='#f2f2f2';">Visual Sounds</a>
        
        <a href="touch.html" 
           style="display: block; color: #f2f2f2; text-align: center; padding: 10px 10px; text-decoration: none; font-size: 15px; transition: background-color 0.3s, color 0.3s;"
           onmouseover="this.style.backgroundColor='#ddd'; this.style.color='black'; this.style.borderRadius='4px';"
           onmouseout="this.style.backgroundColor='transparent'; this.style.color='#f2f2f2';">Touch Chords</a>
    </nav>


    <!-- Canvas for rendering -->
    <div id="canvas-container">
        <canvas id="geometryCanvas"></canvas>
    </div>

    <!-- UI Overlay -->
    <div id="ui-panel" class="absolute top-4 left-4 w-80 max-w-[calc(100vw-2rem)] max-h-[calc(100vh-2rem)] flex flex-col bg-black/40 backdrop-blur-xl border border-white/10 rounded-2xl shadow-2xl z-10 overflow-hidden transition-transform duration-300">
        
        <div class="p-4 border-b border-white/10 flex justify-between items-center bg-white/5">
            <h1 class="text-xl font-light tracking-widest text-amber-200 uppercase">Sacred Geometry</h1>
            <button id="toggle-ui" class="text-gray-400 hover:text-white p-1">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>
            </button>
        </div>

        <div id="controls-body" class="p-5 overflow-y-auto controls-scroll space-y-5">
            
            <!-- Nodes Count -->
            <div>
                <div class="flex justify-between text-sm mb-1">
                    <label class="text-gray-300">Number of Shapes</label>
                    <span id="countVal" class="text-amber-300 font-mono">1500</span>
                </div>
                <input type="range" id="nodeCount" min="1" max="10000" value="1500" step="1">
            </div>

            <!-- Angle (The Secret of Sacred Geometry) -->
            <div>
                <div class="flex justify-between text-sm mb-1">
                    <label class="text-gray-300">Sacred Angle (Degrees)</label>
                    <span id="angleVal" class="text-amber-300 font-mono">137.5°</span>
                </div>
                <input type="range" id="angle" min="0" max="360" value="137.5" step="0.01">
                
                <div class="grid grid-cols-4 gap-2 mt-2">
                    <button class="preset-btn text-xs border border-white/20 rounded py-1 bg-white/5" onclick="setAngle(137.5)">Golden</button>
                    <button class="preset-btn text-xs border border-white/20 rounded py-1 bg-white/5" onclick="setAngle(90)">Square</button>
                    <button class="preset-btn text-xs border border-white/20 rounded py-1 bg-white/5" onclick="setAngle(60)">Hex</button>
                    <button class="preset-btn text-xs border border-white/20 rounded py-1 bg-white/5" onclick="setAngle(144)">Star</button>
                </div>
            </div>

            <!-- Spread / Scale -->
            <div>
                <div class="flex justify-between text-sm mb-1">
                    <label class="text-gray-300">Expansion Scale</label>
                    <span id="scaleVal" class="text-amber-300 font-mono">8</span>
                </div>
                <input type="range" id="scale" min="1" max="50" value="8" step="0.5">
            </div>

            <!-- Rotation Speed -->
            <div>
                <div class="flex justify-between text-sm mb-1">
                    <label class="text-gray-300">Cosmic Rotation</label>
                    <span id="speedVal" class="text-amber-300 font-mono">0.2</span>
                </div>
                <input type="range" id="speed" min="-2" max="2" value="0.2" step="0.05">
            </div>

            <!-- Shape Type -->
            <div>
                <label class="text-sm text-gray-300 mb-2 block">Shape Element</label>
                <div class="grid grid-cols-2 gap-2">
                    <button class="shape-btn bg-amber-500/20 border border-amber-500/50 rounded py-2 text-sm transition" data-shape="circle">Circles</button>
                    <button class="shape-btn bg-white/5 border border-white/20 rounded py-2 text-sm transition hover:bg-white/10" data-shape="hexagram">Hexagrams</button>
                    <button class="shape-btn bg-white/5 border border-white/20 rounded py-2 text-sm transition hover:bg-white/10" data-shape="diamonds">Diamonds</button>
                    <button class="shape-btn bg-white/5 border border-white/20 rounded py-2 text-sm transition hover:bg-white/10" data-shape="mesh">Lines Only</button>
                </div>
            </div>

            <!-- Intersecting Lines Toggle -->
            <div class="flex items-center justify-between py-1">
                <label class="text-sm text-gray-300 cursor-pointer select-none" for="intersectToggle">Intersecting Lines</label>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="intersectToggle" class="sr-only peer">
                    <div class="w-11 h-6 bg-white/10 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-amber-500"></div>
                </label>
            </div>
            
            <!-- Color Palette -->
            <div>
                <label class="text-sm text-gray-300 mb-2 block">Aura Palette</label>
                <select id="palette" class="w-full bg-black/50 border border-white/20 rounded p-2 text-sm text-white focus:outline-none focus:border-amber-400">
                    <option value="gold">Golden Cosmic Ray</option>
                    <option value="nebula">Deep Nebula (Purple/Cyan)</option>
                    <option value="chakra">7 Chakras Spectrum</option>
                    <option value="monochrome">Ethereal White</option>
                </select>
            </div>

        </div>
    </div>

    <!-- Initial Loader -->
    <div id="loader" class="absolute inset-0 z-50 bg-[#050510] flex items-center justify-center pointer-events-none">
        <div class="w-16 h-16 border-4 border-amber-500/30 border-t-amber-500 rounded-full animate-spin"></div>
    </div>

    <script>
        // DOM Elements
        const canvas = document.getElementById('geometryCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        
        // UI Controls
        const inputs = {
            count: document.getElementById('nodeCount'),
            angle: document.getElementById('angle'),
            scale: document.getElementById('scale'),
            speed: document.getElementById('speed'),
            palette: document.getElementById('palette'),
            intersect: document.getElementById('intersectToggle')
        };
        const labels = {
            count: document.getElementById('countVal'),
            angle: document.getElementById('angleVal'),
            scale: document.getElementById('scaleVal'),
            speed: document.getElementById('speedVal')
        };

        // State Variables
        let width, height, cx, cy;
        let globalRotation = 0;
        let currentShape = 'circle';
        
        // Starfield background state
        const stars = [];
        const numStars = 400;

        // Initialize Canvas Size
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            cx = width / 2;
            cy = height / 2;
            
            if (stars.length === 0) {
                initStars();
            }
        }
        window.addEventListener('resize', resize);
        resize();

        // 3D Starfield Initialization
        function initStars() {
            for (let i = 0; i < numStars; i++) {
                stars.push({
                    x: (Math.random() - 0.5) * width * 2,
                    y: (Math.random() - 0.5) * height * 2,
                    z: Math.random() * width,
                    pz: 0
                });
            }
        }

        // Draw Cosmic Background
        function drawBackground() {
            const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(width, height));
            grad.addColorStop(0, '#0d0d1a');
            grad.addColorStop(0.6, '#06050b');
            grad.addColorStop(1, '#020205');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, width, height);

            ctx.fillStyle = 'white';
            const speedScale = 1 + (Math.abs(parseFloat(inputs.speed.value)) * 2);
            
            for (let i = 0; i < numStars; i++) {
                let star = stars[i];
                star.pz = star.z;
                star.z -= speedScale;
                
                if (star.z <= 0) {
                    star.z = width;
                    star.x = (Math.random() - 0.5) * width * 2;
                    star.y = (Math.random() - 0.5) * height * 2;
                    star.pz = star.z;
                }

                let sx = (star.x / star.z) * width + cx;
                let sy = (star.y / star.z) * height + cy;
                let px = (star.x / star.pz) * width + cx;
                let py = (star.y / star.pz) * height + cy;
                let size = (1 - star.z / width) * 2.5;

                ctx.beginPath();
                ctx.arc(sx, sy, size, 0, Math.PI * 2);
                ctx.fill();

                if (speedScale > 1.5) {
                    ctx.strokeStyle = `rgba(255, 255, 255, ${0.3 * (1 - star.z / width)})`;
                    ctx.lineWidth = size;
                    ctx.beginPath();
                    ctx.moveTo(px, py);
                    ctx.lineTo(sx, sy);
                    ctx.stroke();
                }
            }
        }

        // Colors based on palettes
        function getColor(index, total, paletteType, alpha = 1) {
            const ratio = index / total;
            switch(paletteType) {
                case 'gold':
                    return `hsla(${40 + ratio * 20}, 100%, ${50 + ratio * 30}%, ${alpha})`;
                case 'nebula':
                    return `hsla(${260 - ratio * 80}, 90%, 65%, ${alpha})`;
                case 'chakra':
                    return `hsla(${ratio * 360}, 100%, 60%, ${alpha})`;
                case 'monochrome':
                    return `rgba(255, 255, 255, ${alpha === 1 ? 0.4 + ratio * 0.6 : alpha})`;
                default:
                    return `rgba(255, 255, 255, ${alpha})`;
            }
        }

        // Draw Individual Shapes
        function drawHexagram(x, y, r) {
            const h = r * Math.sqrt(3) / 2;
            ctx.beginPath();
            ctx.moveTo(x, y - r);
            ctx.lineTo(x + h, y + r/2);
            ctx.lineTo(x - h, y + r/2);
            ctx.closePath();
            ctx.moveTo(x, y + r);
            ctx.lineTo(x - h, y - r/2);
            ctx.lineTo(x + h, y - r/2);
            ctx.closePath();
            ctx.stroke();
        }

        function drawDiamond(x, y, r) {
            ctx.beginPath();
            ctx.moveTo(x, y - r);
            ctx.lineTo(x + r/1.5, y);
            ctx.lineTo(x, y + r);
            ctx.lineTo(x - r/1.5, y);
            ctx.closePath();
            ctx.stroke();
        }

        // Main Drawing Loop
        function animate() {
            drawBackground();

            const n = parseInt(inputs.count.value);
            const angleDeg = parseFloat(inputs.angle.value);
            const angleRad = angleDeg * Math.PI / 180;
            const c = parseFloat(inputs.scale.value);
            const rotSpeed = parseFloat(inputs.speed.value);
            const palette = inputs.palette.value;
            const drawLines = inputs.intersect.checked || currentShape === 'mesh';

            globalRotation += (rotSpeed * 0.005);

            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(globalRotation);
            
            ctx.globalCompositeOperation = n < 2000 ? 'screen' : 'source-over';
            
            const nodes = [];

            // 1. Calculate Positions and Draw Base Shapes
            ctx.lineWidth = n > 5000 ? 0.3 : (n > 2000 ? 0.6 : 1);
            
            for (let i = 1; i <= n; i++) {
                const r = c * Math.sqrt(i);
                const a = i * angleRad;
                
                const x = r * Math.cos(a);
                const y = r * Math.sin(a);
                
                nodes.push({x, y});

                if (currentShape !== 'mesh') {
                    ctx.strokeStyle = getColor(i, n, palette);
                    const size = Math.max(1, (c * 0.8) + (i / n) * 5);

                    if (currentShape === 'circle') {
                        ctx.beginPath();
                        ctx.arc(x, y, size, 0, Math.PI * 2);
                        ctx.stroke();
                    } else if (currentShape === 'hexagram') {
                        drawHexagram(x, y, size * 1.2);
                    } else if (currentShape === 'diamonds') {
                        drawDiamond(x, y, size * 1.5);
                    }
                }
            }

            // 2. Draw Intersecting Connectivity Mesh
            if (drawLines && nodes.length > 0) {
                // Use thinner lines if drawing shapes as well so it doesn't get cluttered
                ctx.lineWidth = currentShape !== 'mesh' ? (n > 2000 ? 0.1 : 0.3) : (n > 5000 ? 0.2 : 0.6);
                
                for (let i = 1; i < nodes.length; i++) {
                    // Set color with a slightly lower opacity if combined with shapes
                    const lineAlpha = currentShape !== 'mesh' ? 0.6 : 1;
                    ctx.strokeStyle = getColor(i, nodes.length, palette, lineAlpha);
                    
                    ctx.beginPath();
                    ctx.moveTo(nodes[i].x, nodes[i].y);
                    ctx.lineTo(nodes[i-1].x, nodes[i-1].y);
                    
                    // Fibonacci sequence back-steps for classic sacred geometry intersection lines
                    const backSteps = [5, 8, 13, 21, 34];
                    for(let step of backSteps) {
                        if (i > step) {
                            ctx.lineTo(nodes[i-step].x, nodes[i-step].y);
                        }
                    }
                    ctx.stroke();
                }
            }

            ctx.restore();
            requestAnimationFrame(animate);
        }

        // Global function to set angle from presets
        window.setAngle = function(val) {
            inputs.angle.value = val;
            labels.angle.innerText = val + "°";
        };

        // Event Listeners for UI
        ['count', 'angle', 'scale', 'speed'].forEach(key => {
            inputs[key].addEventListener('input', (e) => {
                let val = e.target.value;
                if (key === 'angle') val += "°";
                labels[key].innerText = val;
            });
        });

        // Shape Button Logic
        document.querySelectorAll('.shape-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.shape-btn').forEach(b => {
                    b.classList.remove('bg-amber-500/20', 'border-amber-500/50');
                    b.classList.add('bg-white/5', 'border-white/20');
                });
                const target = e.target;
                target.classList.remove('bg-white/5', 'border-white/20');
                target.classList.add('bg-amber-500/20', 'border-amber-500/50');
                currentShape = target.dataset.shape;
                
                // Automatically disable intersect toggle if "Lines Only" is chosen
                // to prevent double-drawing logic visually (though code handles it safely)
                if (currentShape === 'mesh') {
                    inputs.intersect.disabled = true;
                    inputs.intersect.parentElement.classList.add('opacity-50');
                } else {
                    inputs.intersect.disabled = false;
                    inputs.intersect.parentElement.classList.remove('opacity-50');
                }
            });
        });

        // UI Toggle
        const uiPanel = document.getElementById('ui-panel');
        const uiBody = document.getElementById('controls-body');
        let uiOpen = true;
        document.getElementById('toggle-ui').addEventListener('click', function() {
            uiOpen = !uiOpen;
            if (uiOpen) {
                uiBody.style.display = 'block';
                this.style.transform = 'rotate(0deg)';
            } else {
                uiBody.style.display = 'none';
                this.style.transform = 'rotate(180deg)';
            }
        });

        // Start App
        window.onload = function() {
            setTimeout(() => {
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }, 300);

            animate();
        };

    </script>
</body>
