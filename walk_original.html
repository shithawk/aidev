<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>AI earth grid</title>
  <meta name="description" content="Canvas pixels x y">
  <meta name="author" content="ShitHawk">
  <style>
    body { font-family: sans-serif; padding: 16px; }
    button { margin: 4px 4px 4px 0; padding: 6px 12px; cursor: pointer; }
    canvas { display: block; margin-top: 12px; border: 1px solid #eeeeee; }
    label { display: inline-block; width: 320px; }
  </style>
  <script type="text/javascript">
    function init() {
      var startX  = 600;
      var startY  = 600;
      var colourS = 8;
      draw(startX, startY, colourS);
    }

    function custom() {
      var startX  = parseInt(document.aivalues.formX.value,  10);
      var startY  = parseInt(document.aivalues.formY.value,  10);
      var colourS = parseInt(document.aivalues.formC.value,  10);
      draw(startX, startY, colourS);
    }

    function clearCanvas() {
      var canvas = document.getElementById('earth');
      var ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    function draw(startX, startY, colourS) {
      var ctx = document.getElementById('earth').getContext('2d');
      ctx.fillRect(startX, startY, 1, 1);
      for (var i = 0; i <= 1000000; i++) {
        startX = startX + Math.floor((Math.random() * 3) + 1) - 2;
        startY = startY + Math.floor((Math.random() * 3) + 1) - 2;
        ctx.fillStyle = '#' + Math.floor(Math.random() * 16777215).toString(colourS);
        ctx.fillRect(startX, startY, 1, 1);
      }
    }
  </script>
</head>
<body onload="init()">

  <form name="aivalues">
    <label>X position start value (0–1200):</label>
    <input name="formX" value="600"><br/>
    <label>Y position start value (0–1200):</label>
    <input name="formY" value="600"><br/>
    <label>Random colour seed 1–16 (16 = all colours):</label>
    <input name="formC" value="8"><br/>
  </form>

  <br/>
  <button onclick="init()">Draw with defaults</button>
  <button onclick="custom()">Draw with custom values</button>
  <button onclick="clearCanvas()">Clear canvas</button>
  <br/>
  <small>Each draw adds one million random pixels — takes a few seconds.</small>

  <canvas id="earth" width="1200" height="1200">
    Sorry, your browser doesn't support the canvas element.
  </canvas>

</body>
</html>
