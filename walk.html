<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cryptographic Random Walk Generator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: #1e293b;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 850px;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }
        canvas {
            background-color: #ffffff;
            border: 4px solid #334155;
            border-radius: 8px;
            cursor: crosshair;
            margin-bottom: 10px;
        }
        input {
            padding: 10px;
            width: 150px;
            border-radius: 6px;
            border: 1px solid #475569;
            background: #0f172a;
            color: #38bdf8;
            font-weight: bold;
            font-size: 1rem;
        }
        button {
            padding: 10px 24px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            border-radius: 6px;
            transition: all 0.2s;
        }
        button:hover {
            background-color: #7dd3fc;
            transform: translateY(-1px);
        }
        .entropy-status {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 15px;
        }
        .security-code-box {
            background: #0f172a;
            border: 1px solid #475569;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', Courier, monospace;
            color: #4ade80;
            word-break: break-all;
            margin-top: 15px;
            min-height: 24px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Cryptographic Random Walk</h2>
        <p>Wiggle your mouse over the page to charge the human entropy pool.</p>
        
        <div class="entropy-status" id="entropyStatus">
            Entropy Pool: 0% charged (Move your mouse!)
        </div>

        <div class="controls">
            <div>
                <label for="stepCount">Moves: </label>
                <input type="number" id="stepCount" min="100" max="1000000" value="100000">
            </div>
            <button id="startBtn">Generate Walk</button>
        </div>

        <!-- The Drawing Canvas -->
        <canvas id="walkCanvas" width="800" height="600"></canvas>
        
        <!-- The Output Box for the Security Hash -->
        <div class="security-code-box" id="securityCode">
            Awaiting walk completion...
        </div>
    </div>

    <script>
        const canvas = document.getElementById('walkCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const inputSteps = document.getElementById('stepCount');
        const entropyStatus = document.getElementById('entropyStatus');
        const securityCodeBox = document.getElementById('securityCode');

        let animationId;
        let entropyPool = [];
        const MAX_ENTROPY = 200;

        // --- 1. COLLECT HUMAN PHYSICAL ENTROPY ---
        window.addEventListener('mousemove', (e) => {
            if (entropyPool.length < MAX_ENTROPY) {
                // Capturing precise coordinates and microsecond timestamps
                entropyPool.push(e.pageX, e.pageY, performance.now());
                const percent = Math.floor((entropyPool.length / MAX_ENTROPY) * 100);
                entropyStatus.innerText = `Entropy Pool: ${percent}% charged (Human physical noise added)`;
                if (percent === 100) entropyStatus.style.color = "#4ade80";
            }
        });

        // --- 2. HARDWARE-BASED RANDOMNESS (Web Crypto API) ---
        function getHardwareRandom() {
            const array = new Uint32Array(1);
            // Taps into OS-level entropy (thermal noise, etc.)
            window.crypto.getRandomValues(array);
            return array[0];
        }

        // --- 3. CRYPTOGRAPHIC HASHING ---
        async function generateSecurityCode() {
            securityCodeBox.innerText = "Calculating secure SHA-256 hash...";
            securityCodeBox.style.color = "#fbbf24"; // Yellow while calculating

            // Get raw image data as Base64
            const dataUrl = canvas.toDataURL("image/png");
            
            // Convert to byte array
            const encoder = new TextEncoder();
            const data = encoder.encode(dataUrl);
            
            // Hash the data using SHA-256
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            
            // Convert buffer to hex string
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            
            // Display result
            securityCodeBox.innerText = `Unique Image Hash:\n${hashHex}`;
            securityCodeBox.style.color = "#4ade80"; // Green for success
        }

        // --- 4. MAIN DRAWING LOOP ---
        startBtn.addEventListener('click', () => {
            if (animationId) cancelAnimationFrame(animationId);

            // Reset the UI for a new run
            securityCodeBox.innerText = "Walk in progress...";
            securityCodeBox.style.color = "#94a3b8";

            let totalSteps = parseInt(inputSteps.value, 10);
            if (isNaN(totalSteps) || totalSteps < 100) totalSteps = 100;
            if (totalSteps > 1000000) totalSteps = 1000000;
            inputSteps.value = totalSteps;

            // Clear canvas
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Start in the center
            let x = Math.floor(canvas.width / 2);
            let y = Math.floor(canvas.height / 2);
            
            // Trail style
            ctx.fillStyle = 'rgba(0, 102, 255, 0.6)';

            let stepsTaken = 0;
            // Adaptive batch size
            const batchSize = Math.max(200, Math.floor(totalSteps / 150));

            function drawBatch() {
                let stepsThisFrame = 0;

                while (stepsThisFrame < batchSize && stepsTaken < totalSteps) {
                    ctx.fillRect(x, y, 1, 1);

                    // Combine hardware noise with human movement noise
                    const hardwareNoise = getHardwareRandom();
                    const humanNoise = entropyPool.length > 0 ? entropyPool[stepsTaken % entropyPool.length] : 0;
                    
                    const direction = (hardwareNoise + Math.floor(humanNoise)) % 4;

                    if (direction === 0) y -= 1;
                    else if (direction === 1) y += 1;
                    else if (direction === 2) x -= 1;
                    else if (direction === 3) x += 1;

                    // Boundary collision
                    if (x < 0) x = 0;
                    if (x >= canvas.width) x = canvas.width - 1;
                    if (y < 0) y = 0;
                    if (y >= canvas.height) y = canvas.height - 1;

                    stepsTaken++;
                    stepsThisFrame++;
                }

                if (stepsTaken < totalSteps) {
                    // Continue walking
                    animationId = requestAnimationFrame(drawBatch);
                } else {
                    // Walk is completely finished, generate the code
                    generateSecurityCode();
                }
            }

            // Start the first batch
            drawBatch();
        });
    </script>
</body>
</html>
