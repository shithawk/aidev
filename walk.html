<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cryptographic Random Walk Generator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: #1e293b;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 850px;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }
        canvas {
            background-color: #ffffff;
            border: 4px solid #334155;
            border-radius: 8px;
            cursor: crosshair;
            margin-bottom: 10px;
        }
        input[type="number"] {
            padding: 10px;
            width: 150px;
            border-radius: 6px;
            border: 1px solid #475569;
            background: #0f172a;
            color: #38bdf8;
            font-weight: bold;
            font-size: 1rem;
        }
        button {
            padding: 10px 24px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            border-radius: 6px;
            transition: all 0.2s;
        }
        button:hover {
            background-color: #7dd3fc;
            transform: translateY(-1px);
        }
        .entropy-status {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 15px;
        }
        .color-swatch {
            display: inline-block;
            width: 18px;
            height: 18px;
            border-radius: 4px;
            border: 2px solid #475569;
            vertical-align: middle;
            margin-left: 8px;
        }
        .security-code-box {
            background: #0f172a;
            border: 1px solid #475569;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', Courier, monospace;
            color: #4ade80;
            word-break: break-all;
            margin-top: 15px;
            min-height: 24px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Cryptographic Random Walk</h2>
        <p>Wiggle your mouse over the page to charge the human entropy pool.</p>

        <div class="entropy-status" id="entropyStatus">
            Entropy Pool: 0% charged (Move your mouse!)
        </div>

        <div class="controls">
            <div>
                <label for="stepCount">Moves: </label>
                <input type="number" id="stepCount" min="100" max="1000000" value="1000000">
            </div>
            <button id="startBtn">Generate Walk</button>
            <button id="clearBtn">Clear</button>
        </div>

        <!-- Current path colour indicator -->
        <div style="margin-bottom: 12px; font-size: 0.9rem; color: #94a3b8;">
            Path colour: <span id="colorLabel">—</span>
            <span class="color-swatch" id="colorSwatch"></span>
        </div>

        <canvas id="walkCanvas" width="800" height="600"></canvas>

        <div class="security-code-box" id="securityCode">
            Awaiting walk completion...
        </div>
    </div>

    <script>
        const canvas          = document.getElementById('walkCanvas');
        const ctx             = canvas.getContext('2d');
        const startBtn        = document.getElementById('startBtn');
        const clearBtn        = document.getElementById('clearBtn');
        const inputSteps      = document.getElementById('stepCount');
        const entropyStatus   = document.getElementById('entropyStatus');
        const securityCodeBox = document.getElementById('securityCode');
        const colorLabel      = document.getElementById('colorLabel');
        const colorSwatch     = document.getElementById('colorSwatch');

        let animationId;
        let entropyPool = [];
        const MAX_ENTROPY = 200;

        // --- 1. COLLECT HUMAN PHYSICAL ENTROPY ---
        window.addEventListener('mousemove', (e) => {
            if (entropyPool.length < MAX_ENTROPY) {
                entropyPool.push(e.pageX, e.pageY, performance.now());
                const percent = Math.min(100, Math.floor((entropyPool.length / MAX_ENTROPY) * 100));
                entropyStatus.textContent = `Entropy Pool: ${percent}% charged (Human physical noise added)`;
                if (percent === 100) entropyStatus.style.color = '#4ade80';
            }
        });

        // --- 2. HARDWARE-BASED RANDOMNESS (Web Crypto API) ---
        function getHardwareRandom() {
            const array = new Uint32Array(1);
            window.crypto.getRandomValues(array);
            return array[0];
        }

        // --- 3. GENERATE A RANDOM VIVID PATH COLOUR ---
        // Uses Web Crypto for the hue so the colour is hardware-seeded too.
        // Fully-saturated HSL ensures the path is always vivid on a white canvas.
        function getRandomPathColor() {
            const array = new Uint8Array(1);
            window.crypto.getRandomValues(array);
            const hue = Math.floor((array[0] / 255) * 360);  // 0-359 degrees
            const hex = hslToHex(hue, 90, 40);               // vivid, dark enough to read
            return { hue, hex };
        }

        // Convert HSL to a hex colour string
        function hslToHex(h, s, l) {
            s /= 100;
            l /= 100;
            const k = n => (n + h / 30) % 12;
            const a = s * Math.min(l, 1 - l);
            const f = n => l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));
            const toHex = x => Math.round(x * 255).toString(16).padStart(2, '0');
            return `#${toHex(f(0))}${toHex(f(8))}${toHex(f(4))}`;
        }

        // --- 4. CRYPTOGRAPHIC HASHING ---
        async function generateSecurityCode() {
            securityCodeBox.textContent = 'Calculating secure SHA-256 hash...';
            securityCodeBox.style.color = '#fbbf24';

            const dataUrl    = canvas.toDataURL('image/png');
            const encoder    = new TextEncoder();
            const data       = encoder.encode(dataUrl);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashHex    = Array.from(new Uint8Array(hashBuffer))
                                    .map(b => b.toString(16).padStart(2, '0'))
                                    .join('');

            securityCodeBox.textContent = `Unique Image Hash:\n${hashHex}`;
            securityCodeBox.style.color = '#4ade80';
        }

        // --- 5. CLEAR CANVAS ---
        function resetCanvas() {
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            securityCodeBox.textContent = 'Awaiting walk completion...';
            securityCodeBox.style.color = '#94a3b8';
            colorLabel.textContent = '—';
            colorSwatch.style.backgroundColor = '';
        }

        clearBtn.addEventListener('click', resetCanvas);

        // --- 6. MAIN DRAWING LOOP ---
        startBtn.addEventListener('click', () => {
            if (animationId) cancelAnimationFrame(animationId);

            securityCodeBox.textContent = 'Walk in progress...';
            securityCodeBox.style.color = '#94a3b8';

            let totalSteps = parseInt(inputSteps.value, 10);
            if (isNaN(totalSteps) || totalSteps < 100) totalSteps = 100;
            if (totalSteps > 1000000) totalSteps = 1000000;
            inputSteps.value = totalSteps;

            // Pick a new random colour for this run and show it
            const { hue, hex } = getRandomPathColor();
            colorLabel.textContent = hex.toUpperCase();
            colorSwatch.style.backgroundColor = hex;

            // Clear canvas, then restore path colour
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = `hsla(${hue}, 90%, 40%, 0.6)`;

            let x = Math.floor(canvas.width  / 2);
            let y = Math.floor(canvas.height / 2);

            let stepsTaken = 0;
            const batchSize = Math.max(200, Math.floor(totalSteps / 150));

            function drawBatch() {
                let stepsThisFrame = 0;

                while (stepsThisFrame < batchSize && stepsTaken < totalSteps) {
                    ctx.fillRect(x, y, 1, 1);

                    const hardwareNoise = getHardwareRandom();
                    const humanNoise    = entropyPool.length > 0
                        ? entropyPool[stepsTaken % entropyPool.length]
                        : 0;

                    const direction = (hardwareNoise + Math.floor(humanNoise)) % 4;

                    if      (direction === 0) y -= 1;
                    else if (direction === 1) y += 1;
                    else if (direction === 2) x -= 1;
                    else                      x += 1;

                    // Boundary collision
                    if (x < 0) x = 0;
                    if (x >= canvas.width)  x = canvas.width  - 1;
                    if (y < 0) y = 0;
                    if (y >= canvas.height) y = canvas.height - 1;

                    stepsTaken++;
                    stepsThisFrame++;
                }

                if (stepsTaken < totalSteps) {
                    animationId = requestAnimationFrame(drawBatch);
                } else {
                    animationId = null;
                    generateSecurityCode();
                }
            }

            drawBatch();
        });
    </script>
</body>
</html>
